<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Post — Tejas Kolhe</title>
  <meta name="description" content="A blog post by Tejas Kolhe.">
  <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>

  <div id="navbar-container"></div>

  <!-- Post Detail -->
  <section class="section">
    <div class="container">
      <div id="post-content">
        <p>Loading post...</p>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <!-- Scripts -->
  <script>const BASE_PATH = '../../../';</script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../../../js/markdown.js"></script>
  <script src="../../../js/components.js"></script>
  <script src="../../../js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const slug = 'getting-started-with-web-dev';
      const container = document.getElementById('post-content');

      if (!slug) {
        container.innerHTML = '<p>No post specified. <a href="../../blog.html">Browse all posts →</a></p>';
        return;
      }

      try {
        const post = await loadMarkdown(BASE_PATH + `content/blog/${slug}.md`);
        const fm = post.frontmatter;

        document.title = `${fm.title || slug} — Tejas Kolhe`;
        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc && fm.summary) metaDesc.setAttribute('content', fm.summary);

        container.innerHTML = `
          <div class="post-header">
            <a href="../../blog.html" class="post-header__back">← All Posts</a>
            <h1 class="post-header__title">${fm.title || slug}</h1>
            <div class="post-header__meta">
              ${fm.date ? `<span>${new Date(fm.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</span>` : ''}
              ${fm.reading_time ? `<span>· ${fm.reading_time}</span>` : ''}
            </div>
            <div class="post-header__tags">
              ${(fm.tags || []).map(t => `<a href="../../blog.html?tag=${t}" class="tag tag--clickable">${t}</a>`).join('')}
            </div>
          </div>
          <div class="md-content">${post.html}</div>
        `;
      } catch (e) {
        console.error('Failed to load post:', e);
        container.innerHTML = '<p>Post not found. <a href="../../blog.html">Browse all posts →</a></p>';
      }
    });
  </script>

</body>
</html>
